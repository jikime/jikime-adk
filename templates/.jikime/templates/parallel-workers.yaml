name: parallel-workers
version: "1.2.0"
description: "3 parallel workers with no leader. Tasks are pre-created in the template and distributed by owner assignment."
default_budget: 150000

agents:
  - id: worker-1
    role: worker
    auto_spawn: true
    description: "Self-directing worker — claims and executes tasks from the shared queue"
    task: |
      Goal: {{goal}}

      You are worker-1. Tasks are pre-created in the queue before workers start.

      Loop until the queue is empty:
      1. Check inbox for shutdown messages:
         jikime team inbox receive {{team_name}}
         - If message contains "Shutting down" or "All done" → EXIT now.
      2. Check for tasks assigned to you:
         jikime team tasks list {{team_name}} --owner {{agent_id}}
      3. If no owned tasks, check for any unowned pending tasks:
         jikime team tasks list {{team_name}} --status pending
      4. If no tasks found in step 2 or 3 → queue is empty. EXIT now.
      5. When tasks are found:
         a. Claim one: jikime team tasks claim {{team_name}} <task-id> --agent {{agent_id}}
         b. Read the task description and DoD carefully.
         c. Implement the required work fully.
         d. Mark complete: jikime team tasks complete {{team_name}} <task-id> --agent {{agent_id}} --result "Brief summary"
         e. Go back to step 1.

