name: leader-worker-reviewer
version: "1.3.0"
description: "Leader + 2 workers + 1 reviewer. Leader signals workers to start; reviewer validates completed tasks before integration."
default_budget: 300000

agents:
  - id: leader
    role: leader
    auto_spawn: true
    description: "Analyzes the goal, creates tasks with pre-assigned owners, signals workers, waits for completion, then integrates"
    task: |
      Goal: {{goal}}

      Your responsibilities as team leader:
      1. Analyze the goal and break it into concrete tasks.
      2. Create ALL tasks first, pre-assigning each to a worker with --owner:
         jikime team tasks create {{team_name}} "Task title" --desc "What to do" --dod "Done when..." --owner worker-1
         jikime team tasks create {{team_name}} "Task title" --desc "What to do" --dod "Done when..." --owner worker-2
      3. Signal workers and reviewer to start (they are waiting for this):
         jikime team inbox broadcast {{team_name}} "Tasks are ready. Start working now."
      4. Run the BLOCKING wait command — polls every 5 seconds until ALL tasks complete:
         jikime team tasks wait {{team_name}} --timeout 3600
         Do NOT proceed until this command returns.
      5. When wait returns, perform final integration:
         a. Review all files created/modified by workers.
         b. Fix any integration issues (missing imports, broken references, type errors).
         c. Run the build or test command to verify everything works.
         d. Commit the final integrated result with a clear summary commit message.
      6. Shut down the team:
         jikime team inbox broadcast {{team_name}} "Integration complete. Shutting down."
         (Workers and reviewer will EXIT on their own when they receive this message.)

      Team: worker-1, worker-2 (implement), reviewer (validates completed work)

  - id: worker-1
    role: worker
    auto_spawn: true
    description: "Waits for leader's signal, then claims and executes assigned tasks"
    task: |
      Goal: {{goal}}

      You are worker-1. The leader is analyzing the goal and will assign tasks to you.
      Wait for the leader's signal before looking for tasks.

      Loop until you receive a shutdown message:
      1. Wait for a message from the leader:
         jikime team inbox receive {{team_name}}
         - If message contains "Shutting down" or "Integration complete" → EXIT now.
         - If message contains "Tasks are ready" → proceed to step 2.
         - If no message yet → go back to step 1 and keep waiting.
      2. Check for tasks assigned to you:
         jikime team tasks list {{team_name}} --owner {{agent_id}}
      3. If no owned tasks, check for any unowned pending tasks:
         jikime team tasks list {{team_name}} --status pending
      4. If no tasks found → go back to step 1.
      5. When tasks are found:
         a. Claim one: jikime team tasks claim {{team_name}} <task-id> --agent {{agent_id}}
         b. Read the task description and DoD carefully.
         c. Implement the required work fully.
         d. Mark complete: jikime team tasks complete {{team_name}} <task-id> --agent {{agent_id}} --result "Summary of what was done"
         e. Notify leader: jikime team inbox send {{team_name}} leader "Completed <task-id>: <summary> — awaiting review"
         f. Go back to step 1.

  - id: worker-2
    role: worker
    auto_spawn: true
    description: "Waits for leader's signal, then claims and executes assigned tasks"
    task: |
      Goal: {{goal}}

      You are worker-2. The leader is analyzing the goal and will assign tasks to you.
      Wait for the leader's signal before looking for tasks.

      Loop until you receive a shutdown message:
      1. Wait for a message from the leader:
         jikime team inbox receive {{team_name}}
         - If message contains "Shutting down" or "Integration complete" → EXIT now.
         - If message contains "Tasks are ready" → proceed to step 2.
         - If no message yet → go back to step 1 and keep waiting.
      2. Check for tasks assigned to you:
         jikime team tasks list {{team_name}} --owner {{agent_id}}
      3. If no owned tasks, check for any unowned pending tasks:
         jikime team tasks list {{team_name}} --status pending
      4. If no tasks found → go back to step 1.
      5. When tasks are found:
         a. Claim one: jikime team tasks claim {{team_name}} <task-id> --agent {{agent_id}}
         b. Read the task description and DoD carefully.
         c. Implement the required work fully.
         d. Mark complete: jikime team tasks complete {{team_name}} <task-id> --agent {{agent_id}} --result "Summary of what was done"
         e. Notify leader: jikime team inbox send {{team_name}} leader "Completed <task-id>: <summary> — awaiting review"
         f. Go back to step 1.

  - id: reviewer
    role: reviewer
    auto_spawn: true
    description: "Waits for leader's signal, then reviews completed tasks and approves or requests revisions"
    task: |
      Goal: {{goal}}

      You are the reviewer. Wait for the leader's signal, then review tasks as workers complete them.

      Loop until you receive a shutdown message:
      1. Wait for a message:
         jikime team inbox receive {{team_name}}
         - If message contains "Shutting down" or "Integration complete" → EXIT now.
         - If message contains "Tasks are ready" → proceed to step 2.
         - If no message yet → go back to step 1 and keep waiting.
      2. Check for completed tasks awaiting review:
         jikime team tasks list {{team_name}} --status done
      3. If no done tasks found → workers may still be implementing. Go back to step 1.
      4. For each done task, review the result:
         - If approved: jikime team inbox send {{team_name}} leader "Approved <task-id>: <review notes>"
         - If revision needed:
             jikime team tasks update {{team_name}} <task-id> --status pending
             jikime team inbox send {{team_name}} leader "Revision needed for <task-id>: <what to fix>"
      5. Go back to step 1.
