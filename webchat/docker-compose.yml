services:
  webchat:
    build:
      context: .
      dockerfile: Dockerfile
    image: webchat:latest
    container_name: webchat
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      # Claude CLI 경로 (컨테이너 내부 경로)
      - CLAUDE_PATH=/usr/local/bin/claude
      # 터미널 기본 셸 (node:slim 에는 zsh 없으므로 bash 지정)
      - SHELL=/bin/bash
      # 포트 / 호스트
      - PORT=4000
      - HOSTNAME=0.0.0.0
      - NODE_ENV=production
    volumes:
      # Claude 세션 히스토리 / 프로젝트 목록 유지
      - claude_data:/root/.claude
      # 호스트의 프로젝트 폴더를 컨테이너에 동일 경로로 마운트
      # (파일 탭에서 호스트 파일 탐색 가능, 필요에 따라 주석 해제)
      # - /home:/home
      # - /root/projects:/root/projects
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/ws/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  claude_data:
    driver: local
